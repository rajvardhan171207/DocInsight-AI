<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DocInsight AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="left-panel">

        <h1>DocInsight AI</h1>

        <p>
            Welcome back! Login to continue using the AI-powered
            Document Intelligence Platform.
        </p>

        <ul>
            <li>🤖 AI Summary</li>
            <li>📄 OCR Support</li>
            <li>💬 AI Chat</li>
            <li>📊 Analytics</li>
            <li>📥 PDF Reports</li>
        </ul>

    </div>

    <div class="right-panel">

        <form action="/login" method="POST">

            <h2>Welcome Back</h2>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

            <p class="bottom-text">
                Don't have an account?

                <a href="/register">
                    Register
                </a>

            </p>

        </form>

    </div>

</div>

</body>
</html>
